<!DOCTYPE html><html><head>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <script> window.FontAwesomeConfig = { autoReplaceSvg: 'nest'};</script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/js/all.min.js" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet">
    <style>
        ::-webkit-scrollbar { display: none;}
        body { font-family: 'Inter', sans-serif; overflow: hidden;}
    </style>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#6366f1',
                        secondary: '#f1f5f9'
                    }
                }
            }
        }
    </script>
    <link rel="stylesheet" href="./css/style.css">
</head>
<body class="bg-gradient-to-br from-indigo-50 via-white to-purple-50">

<div id="login-container" class="min-h-screen flex flex-col max-w-md mx-auto bg-white shadow-xl lg:max-w-lg xl:max-w-xl">
    
    <div id="header" class="flex justify-between items-center p-4 sm:p-6 pt-8 sm:pt-12">
        <button class="w-10 h-10 sm:w-12 sm:h-12 rounded-full bg-gray-50 hover:bg-gray-100 shadow-sm flex items-center justify-center transition-colors duration-200">
            <i class="fa-solid fa-arrow-left text-gray-600 text-sm sm:text-base"></i>
        </button>
        <h1 class="text-lg sm:text-xl font-semibold text-gray-900">OTP Testing</h1>
        <div class="w-10 sm:w-12"></div>
    </div>

    <div id="login-content" class="flex-1 px-4 sm:px-6 py-6 sm:py-8">
        
        <div id="welcome-section" class="text-center mb-8 sm:mb-12">
            <div class="w-16 h-16 sm:w-20 sm:h-20 bg-gradient-to-br from-primary to-indigo-600 rounded-2xl sm:rounded-3xl mx-auto mb-4 sm:mb-6 flex items-center justify-center shadow-lg">
                <img src="./favicon/quality-control.png" alt="">
            </div>
            <h2 class="text-xl sm:text-2xl md:text-3xl font-bold text-gray-900 mb-2 sm:mb-3">Checking for OTP</h2>
            <p class="text-gray-600 text-sm sm:text-base leading-relaxed px-2 sm:px-0">Enter your email to receive a verification code.</p>
        </div>

        <div id="login-form" class="space-y-4 sm:space-y-6">
            
            <div id="email-section" class="space-y-3 sm:space-y-4">
                <div class="relative">
                    <label class="block text-xs sm:text-sm font-medium text-gray-700 mb-2">Email Address</label>
                    <div class="relative">
                        <input type="email" id="email-input" placeholder="Enter your email" class="w-full px-3 sm:px-4 py-3 sm:py-4 pl-10 sm:pl-12 bg-white border border-gray-200 rounded-lg sm:rounded-xl focus:ring-2 focus:ring-primary focus:border-transparent outline-none transition-all duration-200 text-sm sm:text-base">
                        <i class="fa-regular fa-envelope absolute left-3 sm:left-4 top-1/2 transform -translate-y-1/2 text-gray-400 text-sm sm:text-base"></i>
                    </div>
                </div>
                
                <button id="send-otp-btn"  class="w-full bg-gradient-to-r from-primary to-indigo-600 text-white py-3 sm:py-4 rounded-lg sm:rounded-xl font-semibold text-sm sm:text-base hover:from-indigo-700 hover:to-indigo-800 transition-all duration-200 shadow-lg hover:shadow-xl transform hover:-translate-y-0.5">
                    Send Verification Code
                </button>
            </div>

            <div id="otp-section" class="space-y-4 sm:space-y-6 hidden">
                <div class="text-center mb-4 sm:mb-6">
                    <h3 class="text-lg sm:text-xl font-semibold text-gray-900 mb-2">Enter Verification Code</h3>
                    <p class="text-gray-600 text-xs sm:text-sm px-2">We sent a 6-digit code to <span id="email-display" class="font-medium text-gray-900"></span></p>
                </div>
                
                <div class="flex justify-center space-x-2 sm:space-x-3 mb-4 sm:mb-6">
                    <input type="text" inputmode="numeric" maxlength="1" class="w-10 h-10 sm:w-12 sm:h-12 text-center text-lg sm:text-xl font-semibold bg-white border border-gray-200 rounded-lg sm:rounded-xl focus:ring-2 focus:ring-primary focus:border-transparent outline-none otp-input transition-all duration-200">
                    <input type="text" inputmode="numeric" maxlength="1" class="w-10 h-10 sm:w-12 sm:h-12 text-center text-lg sm:text-xl font-semibold bg-white border border-gray-200 rounded-lg sm:rounded-xl focus:ring-2 focus:ring-primary focus:border-transparent outline-none otp-input transition-all duration-200">
                    <input type="text" inputmode="numeric" maxlength="1" class="w-10 h-10 sm:w-12 sm:h-12 text-center text-lg sm:text-xl font-semibold bg-white border border-gray-200 rounded-lg sm:rounded-xl focus:ring-2 focus:ring-primary focus:border-transparent outline-none otp-input transition-all duration-200">
                    <input type="text" inputmode="numeric" maxlength="1" class="w-10 h-10 sm:w-12 sm:h-12 text-center text-lg sm:text-xl font-semibold bg-white border border-gray-200 rounded-lg sm:rounded-xl focus:ring-2 focus:ring-primary focus:border-transparent outline-none otp-input transition-all duration-200">
                    <input type="text" inputmode="numeric" maxlength="1" class="w-10 h-10 sm:w-12 sm:h-12 text-center text-lg sm:text-xl font-semibold bg-white border border-gray-200 rounded-lg sm:rounded-xl focus:ring-2 focus:ring-primary focus:border-transparent outline-none otp-input transition-all duration-200">
                    <input type="text" inputmode="numeric" maxlength="1" class="w-10 h-10 sm:w-12 sm:h-12 text-center text-lg sm:text-xl font-semibold bg-white border border-gray-200 rounded-lg sm:rounded-xl focus:ring-2 focus:ring-primary focus:border-transparent outline-none otp-input transition-all duration-200">
                </div>
                
                <button id="verify-otp-btn"  class="w-full bg-gradient-to-r from-primary to-indigo-600 text-white py-3 sm:py-4 rounded-lg sm:rounded-xl font-semibold text-sm sm:text-base hover:from-indigo-700 hover:to-indigo-800 transition-all duration-200 shadow-lg hover:shadow-xl transform hover:-translate-y-0.5">
                    Verify &amp; Sign In
                </button>
                
                <button onclick="goBackToEmail()" class="w-full text-gray-600 py-2 sm:py-3 text-xs sm:text-sm font-medium hover:text-gray-800 transition-colors duration-200 border border-gray-200 rounded-lg sm:rounded-xl hover:bg-gray-50">
                    <i class="fa-solid fa-arrow-left mr-2"></i>Back to Email
                </button>
            </div>
        </div>
    </div>
</div>

        <script src="./js/script.js"></script>
    </body>
</html>
